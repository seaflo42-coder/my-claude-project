<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Korean Heritage for AI Creators">
<title>Hanji Studio — Korean Heritage for AI Creators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── 기본 리셋 & 디자인 토큰 (K-Heritage Modern) ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  /* Color Tokens */
  --color-ground:       #F4EFE6;
  --color-ground-deep:  #EDE5D8;
  --color-ink:          #1A1814;
  --color-ink-mid:      #3D3830;
  --color-ink-soft:     #7A7068;
  --color-ink-ghost:    #C4BBB0;
  --color-accent:       #1A6B5A;
  --color-accent-light: #E8F2EF;
  --color-accent-warm:  #B5391C;
  --color-surface:      #FFFFFF;
  --color-border:       #D9D0C5;
  /* Legacy aliases */
  --bg: var(--color-ground);
  --bg2: var(--color-surface);
  --bg3: var(--color-ground-deep);
  --accent: var(--color-accent);
  --accent2: var(--color-ink);
  --text: var(--color-ink);
  --text2: var(--color-ink-soft);
  --red: var(--color-accent-warm);
  --green: #3d8b5e;
  --blue: #3a6fa0;
  /* Typography */
  --font-display: 'Noto Serif KR', serif;
  --font-body:    'Noto Sans KR', sans-serif;
  --size-xs: 0.75rem; --size-sm: 0.875rem; --size-base: 1rem;
  --size-md: 1.125rem; --size-lg: 1.5rem; --size-xl: 2rem;
  --size-2xl: 3rem; --size-3xl: 4rem;
  /* Spacing */
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-6: 24px; --space-8: 32px; --space-12: 48px; --space-16: 64px;
  /* Radius */
  --radius-sm: 2px; --radius-md: 4px; --radius-lg: 8px; --radius-full: 9999px;
  --radius: var(--radius-lg);
}
body {
  font-family: var(--font-body);
  background: var(--color-ground);
  color: var(--color-ink);
  line-height: 1.7;
  min-height: 100vh;
  position: relative;
}
/* 한지 grain 텍스처 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

/* ── 헤더 ── */
.header {
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: var(--space-12) var(--space-8);
  text-align: center;
}
.header h1 {
  font-family: var(--font-display);
  font-size: var(--size-2xl, 3rem);
  color: var(--color-ink);
  letter-spacing: -0.02em;
}
.logo-hanji { font-weight: 700; }
.logo-studio { font-weight: 300; }
.header .tagline {
  font-family: var(--font-body);
  color: var(--color-ink-soft);
  margin-top: var(--space-2);
  font-size: var(--size-xs);
  letter-spacing: 0.15em;
}
.header .badge {
  display: inline-block;
  background: var(--color-accent-light);
  color: var(--color-accent);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  font-size: var(--size-xs);
  margin-top: var(--space-3);
  border: 1px solid transparent;
  font-weight: 500;
  letter-spacing: 0.15em;
}

/* ── 메인 레이아웃 ── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-8) var(--space-6);
}

/* ── 단계 표시 (sticky) ── */
.step-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-ground);
  border-bottom: 1px solid var(--color-border);
  padding: var(--space-3) var(--space-4);
}
.step-bar-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
}
.step-dots {
  display: flex;
  gap: var(--space-2);
  align-items: center;
}
.step-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--color-border);
  transition: all 0.3s;
}
.step-dot.active {
  background: var(--color-accent);
  box-shadow: 0 0 0 3px var(--color-accent-light);
}
.step-dot.done {
  background: var(--color-accent);
}
.step-label {
  font-family: var(--font-body);
  font-size: var(--size-sm);
  color: var(--color-ink-mid);
  white-space: nowrap;
}
.step-label strong {
  color: var(--color-ink);
}

/* ── 선택값 뱃지 ── */
.selection-badges {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  min-height: 0;
}
.selection-badges:empty { display: none; }
.sel-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-3);
  background: var(--color-accent-light);
  color: var(--color-accent);
  border-radius: var(--radius-full);
  font-family: var(--font-body);
  font-size: var(--size-xs);
  font-weight: 500;
  letter-spacing: 0.02em;
}

/* ── 뒤로가기 버튼 ── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  color: var(--color-ink-soft);
  font-family: var(--font-body);
  font-size: var(--size-sm);
  background: none;
  border: none;
  cursor: pointer;
  padding: var(--space-2) 0;
  margin-bottom: var(--space-4);
  transition: color 0.2s;
}
.back-link:hover { color: var(--color-ink); }

/* ── 섹션 공통 (슬라이드) ── */
.section {
  display: none;
}
.section.visible {
  display: block;
  animation: slideIn 0.35s ease-out;
}
.section.slide-out {
  animation: slideOut 0.25s ease-in forwards;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-40px); }
}
@keyframes slideInReverse {
  from { opacity: 0; transform: translateX(-40px); }
  to   { opacity: 1; transform: translateX(0); }
}
.section.visible.reverse {
  animation: slideInReverse 0.35s ease-out;
}
.section-title {
  font-family: var(--font-display);
  font-size: var(--size-lg);
  font-weight: 700;
  margin-bottom: var(--space-6);
  color: var(--color-ink);
  letter-spacing: -0.02em;
}

/* ── 카테고리 탭 ── */
.category-tabs {
  display: flex;
  gap: var(--space-2);
  margin-bottom: var(--space-6);
  flex-wrap: wrap;
}
.cat-tab {
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-full);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-ink-soft);
  cursor: pointer;
  font-size: var(--size-sm);
  transition: all 0.2s;
  font-weight: 500;
}
.cat-tab:hover { border-color: var(--color-ink); color: var(--color-ink); }
.cat-tab.active {
  background: var(--color-ink);
  border-color: var(--color-ink);
  color: var(--color-surface);
}

/* ── 검색창 ── */
.search-box {
  position: relative;
  margin-bottom: var(--space-4);
}
.search-box input {
  width: 100%;
  padding: var(--space-3) var(--space-4) var(--space-3) 2.5rem;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  color: var(--color-ink);
  font-size: var(--size-sm);
  font-family: var(--font-body);
  outline: none;
  transition: border-color 0.2s;
}
.search-box input::placeholder { color: var(--color-ink-ghost); }
.search-box input:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-light); }
.search-box .search-icon {
  position: absolute;
  left: 0.85rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--color-ink-ghost);
  font-size: 0.9rem;
  pointer-events: none;
}

/* ── 더보기 버튼 ── */
.load-more-wrap {
  text-align: center;
  margin-top: var(--space-4);
}
.load-more-btn {
  padding: var(--space-3) var(--space-6);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  color: var(--color-ink-soft);
  font-size: var(--size-sm);
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.2s;
}
.load-more-btn:hover {
  border-color: var(--color-ink);
  color: var(--color-ink);
}
.item-count {
  text-align: center;
  color: var(--color-ink-ghost);
  font-size: var(--size-xs);
  margin-top: var(--space-2);
}

/* ── 문화유산 카드 그리드 ── */
.heritage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-4);
}
.heritage-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}
.heritage-card:hover {
  border-color: var(--color-ink-ghost);
  transform: translateY(-2px);
  box-shadow: 0 4px 24px rgba(26,24,20,0.08);
}
.heritage-card.selected {
  border-color: var(--color-accent);
  background: var(--color-accent-light);
  box-shadow: 0 0 0 2px var(--color-accent);
}
.heritage-card .card-type {
  display: inline-block;
  font-size: var(--size-xs);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-full);
  background: var(--color-accent-light);
  color: var(--color-accent);
  margin-bottom: var(--space-2);
  font-weight: 500;
}
.heritage-card .card-name {
  font-family: var(--font-display);
  font-size: var(--size-md);
  font-weight: 700;
  margin-bottom: var(--space-1);
  color: var(--color-ink);
  letter-spacing: -0.02em;
}
.heritage-card .card-name-en {
  font-size: var(--size-xs);
  color: var(--color-ink-ghost);
  margin-bottom: var(--space-2);
}
.heritage-card .card-meta {
  font-size: var(--size-xs);
  color: var(--color-ink-soft);
}
.heritage-card .card-era {
  display: inline-block;
  font-size: var(--size-xs);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-full);
  background: var(--color-ground-deep);
  color: var(--color-ink-mid);
  margin-right: var(--space-1);
}
.heritage-card .card-desc {
  font-size: var(--size-sm);
  color: var(--color-ink-soft);
  margin-top: var(--space-3);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── 스타일/모델 선택 ── */
.option-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}
.option-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
}
.option-card:hover { border-color: var(--color-ink); }
.option-card.selected {
  border-color: var(--color-accent);
  background: var(--color-accent-light);
  box-shadow: 0 0 0 2px var(--color-accent);
}
.option-card .opt-icon { font-size: 2rem; margin-bottom: var(--space-2); }
.option-card .opt-name { font-family: var(--font-display); font-weight: 700; margin-bottom: var(--space-1); color: var(--color-ink); }
.option-card .opt-desc { font-size: var(--size-xs); color: var(--color-ink-soft); }

/* ── Step 3: 프롬프트 설정 ── */
.setting-group { margin-bottom: var(--space-6); }
.setting-label {
  display: block;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: var(--size-md);
  margin-bottom: var(--space-3);
  color: var(--color-ink);
}
.free-input {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: var(--size-sm);
  background: var(--color-surface);
  color: var(--color-ink);
  resize: vertical;
  line-height: 1.7;
}
.free-input:focus { outline: none; border-color: var(--color-accent); }
.sensitivity-options { display: flex; gap: var(--space-3); flex-wrap: wrap; }
.sens-btn {
  flex: 1;
  min-width: 120px;
  padding: var(--space-4);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.sens-btn strong { display: block; font-size: var(--size-sm); color: var(--color-ink); margin-bottom: var(--space-1); }
.sens-btn span { font-size: var(--size-xs); color: var(--color-ink-soft); }
.sens-btn:hover { border-color: var(--color-ink); }
.sens-btn.active {
  border-color: var(--color-accent);
  background: var(--color-accent-light);
  box-shadow: 0 0 0 2px var(--color-accent);
}
.advanced-toggle {
  margin-top: var(--space-6);
  margin-bottom: var(--space-4);
}
.advanced-summary {
  cursor: pointer;
  font-family: var(--font-body);
  font-size: var(--size-sm);
  font-weight: 500;
  color: var(--color-ink-soft);
  padding: var(--space-3) 0;
  letter-spacing: 0.05em;
  list-style: none;
}
.advanced-summary::before { content: '▸ '; }
details[open] .advanced-summary::before { content: '▾ '; }
.advanced-summary::-webkit-details-marker { display: none; }
.advanced-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: var(--space-4);
  margin-top: var(--space-4);
  padding: var(--space-6);
  background: var(--color-ground-deep);
  border-radius: var(--radius-lg);
}
.adv-item label {
  display: block;
  font-size: var(--size-xs);
  color: var(--color-ink-soft);
  margin-bottom: var(--space-2);
  font-weight: 500;
}
.adv-item select, .adv-item input[type="text"] {
  width: 100%;
  padding: var(--space-2) var(--space-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: var(--size-xs);
  background: var(--color-surface);
  color: var(--color-ink);
}
.adv-item select:focus, .adv-item input[type="text"]:focus { outline: none; border-color: var(--color-accent); }
.adv-full { grid-column: 1 / -1; }

/* ── 종횡비 선택 ── */
.aspect-ratio-options { display: flex; align-items: center; gap: var(--space-4); }
.aspect-select {
  padding: var(--space-2) var(--space-4);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: var(--size-sm);
  background: var(--color-surface);
  color: var(--color-ink);
  min-width: 200px;
}
.aspect-select:focus { outline: none; border-color: var(--color-accent); }
.aspect-preview {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
}
.aspect-box {
  border: 2px solid var(--color-accent);
  border-radius: var(--radius-sm);
  background: var(--color-accent-light);
  transition: all 0.2s;
}

/* ── 버튼 ── */
.btn-row {
  display: flex;
  gap: var(--space-3);
  margin-top: var(--space-8);
  flex-wrap: wrap;
}
.btn {
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-size: var(--size-sm);
  font-weight: 500;
  font-family: var(--font-body);
  transition: all 0.2s;
}
.btn-primary {
  background: var(--color-ink);
  color: var(--color-surface);
}
.btn-primary:hover { background: var(--color-accent); }
.btn-primary:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.btn-secondary {
  background: transparent;
  color: var(--color-ink-soft);
  border: 1px solid var(--color-border);
}
.btn-secondary:hover { border-color: var(--color-ink); color: var(--color-ink); }
.btn-generate {
  background: var(--color-accent);
  color: var(--color-surface);
  padding: var(--space-4) var(--space-12);
  font-size: var(--size-md);
  border-radius: var(--radius-sm);
  font-weight: 600;
}
.btn-generate:hover {
  box-shadow: 0 4px 16px rgba(26,107,90,0.25);
  transform: translateY(-1px);
}

/* ── 결과 영역 ── */
.results-area {
  margin-top: var(--space-4);
}
.result-block {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-4);
  overflow: hidden;
}
.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-4) var(--space-6);
  background: var(--color-ground-deep);
  cursor: pointer;
}
.result-header h3 {
  font-family: var(--font-display);
  font-size: var(--size-base);
  font-weight: 600;
  color: var(--color-ink);
}
.result-header .tag {
  font-size: var(--size-xs);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-full);
  background: var(--color-accent-light);
  color: var(--color-accent);
  font-weight: 500;
}
.result-body {
  padding: var(--space-6);
}
.prompt-box {
  background: var(--color-ground);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  margin-bottom: var(--space-4);
  position: relative;
}
.prompt-label {
  font-size: var(--size-xs);
  color: var(--color-accent);
  font-weight: 600;
  margin-bottom: var(--space-2);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}
.prompt-text {
  font-size: var(--size-sm);
  line-height: 1.7;
  color: var(--color-ink);
  word-break: break-all;
  white-space: pre-wrap;
}
.copy-btn {
  position: absolute;
  top: var(--space-3);
  right: var(--space-3);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-ink-soft);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: var(--size-xs);
  font-weight: 500;
  font-family: var(--font-body);
  transition: all 0.2s;
}
.copy-btn:hover { background: var(--color-ink); color: var(--color-surface); border-color: var(--color-ink); }
.copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }

/* ── 고증 상세 ── */
.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}
.detail-item {
  background: var(--color-ground);
  border-radius: var(--radius-lg);
  padding: var(--space-3);
}
.detail-item .label {
  font-size: var(--size-xs);
  color: var(--color-accent);
  font-weight: 600;
  margin-bottom: var(--space-1);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.detail-item .value {
  font-size: var(--size-sm);
  color: var(--color-ink);
  line-height: 1.5;
}
.detail-item .tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-1);
}
.detail-item .mini-tag {
  font-size: var(--size-xs);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-full);

<body>

<!-- 헤더 -->
<div class="header">
  <h1><span class="logo-hanji">Hanji</span> <span class="logo-studio">Studio</span></h1>
  <p class="tagline">Korean Heritage for AI Creators</p>
</div>

<div class="container">

  <!-- 단계 표시 (sticky) -->
  <div class="step-bar" id="stepBar">
    <div class="step-bar-inner">
      <div class="step-dots">
        <span class="step-dot active" id="dot1"></span>
        <span class="step-dot" id="dot2"></span>
        <span class="step-dot" id="dot3"></span>
        <span class="step-dot" id="dot4"></span>
        <span class="step-label" id="stepLabel"><strong>Step 1/4</strong> · 유산 선택</span>
      </div>
      <div class="selection-badges" id="selectionBadges"></div>
    </div>
  </div>

  <!-- ========== STEP 1: 문화유산 선택 ========== -->
  <div class="section visible" id="step1">
    <div class="section-title">어떤 문화유산의 이미지를 만들고 싶으세요?</div>

    <div class="category-tabs" id="categoryTabs"></div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="문화유산 이름, 시대, 지역으로 검색..." oninput="onSearchInput()">
    </div>
    <div class="heritage-grid" id="heritageGrid"></div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
      <button class="load-more-btn" onclick="loadMore()">더보기</button>
      <div class="item-count" id="itemCount"></div>
    </div>

  </div>

  <!-- ========== STEP 2: 씬 타입 선택 ========== -->
  <div class="section" id="step2">
    <button class="back-link" onclick="goStep(1)">← 유산 선택으로</button>
    <div class="section-title">어떤 장면으로 표현할까요?</div>

    <div class="option-grid" id="sceneGrid"></div>
  </div>

  <!-- ========== STEP 3: 프롬프트 설정 ========== -->
  <div class="section" id="step3">
    <button class="back-link" onclick="goStep(2)">← 씬 타입으로</button>
    <div class="section-title">프롬프트를 다듬어보세요</div>

    <!-- 자유 입력 -->
    <div class="setting-group">
      <label class="setting-label">자유 입력 <span style="color:var(--color-ink-soft);font-weight:400;font-size:var(--size-xs)">— 원하는 분위기나 상황을 자유롭게 적어주세요</span></label>
      <textarea id="freeInput" class="free-input" rows="3" placeholder="예: 비 오는 날 고즈넉한 풍경, 봄 벚꽃이 흩날리는 장면..."></textarea>
    </div>

    <!-- 감도 선택 -->
    <div class="setting-group">
      <label class="setting-label">고증 감도</label>
      <div class="sensitivity-options" id="sensitivityOptions">

        </button>
        <button class="sens-btn" data-val="cinematic" onclick="selectSensitivity('cinematic')">
          <strong>시네마틱</strong><span>영화 스틸컷 · 아트하우스</span>
        </button>
        <button class="sens-btn" data-val="campaign" onclick="selectSensitivity('campaign')">
          <strong>캠페인</strong><span>광고 · 커머셜</span>
        </button>
      </div>
    </div>

            <option value="eye level">눈높이 (Eye Level)</option>
            <option value="low angle">로우 앵글</option>
            <option value="high angle">하이 앵글</option>
            <option value="bird's eye view">버드아이 뷰</option>
            <option value="worm's eye view">웜즈아이 뷰</option>
            <option value="dutch angle">더치 앵글</option>
          </select>
        </div>
        <div class="adv-item">
          <label>렌즈</label>
          <select id="advLens">
            <option value="">자동</option>
            <option value="wide angle 24mm">광각 24mm</option>
            <option value="standard 50mm">표준 50mm</option>
            <option value="telephoto 85mm">인물 85mm</option>
            <option value="telephoto 200mm">망원 200mm</option>
            <option value="macro lens">매크로</option>
            <option value="tilt-shift lens">틸트시프트</option>
          </select>
        </div>
        <div class="adv-item">
          <label>조명</label>
          <select id="advLighting">
            <option value="">자동</option>
            <option value="golden hour warm sunlight">골든아워</option>
            <option value="soft diffused overcast light">흐린 날 확산광</option>
            <option value="dramatic side lighting with deep shadows">드라마틱 사이드</option>
            <option value="soft moonlight">달빛</option>
            <option value="warm candlelight and lantern glow">촛불/등불</option>
            <option value="bright midday sunlight">한낮 직사광</option>
          </select>
        </div>
        <div class="adv-item">
          <label>계절</label>
          <select id="advSeason">
            <option value="">자동</option>
            <option value="spring with cherry blossoms">봄 (벚꽃)</option>
            <option value="lush green summer">여름 (녹음)</option>
            <option value="autumn with red and golden foliage">가을 (단풍)</option>
            <option value="winter with snow">겨울 (눈)</option>
          </select>
        </div>
        <div class="adv-item">
          <label>시간대</label>
          <select id="advTime">
            <option value="">자동</option>
            <option value="early morning dawn">새벽</option>
            <option value="morning">아침</option>
            <option value="midday">한낮</option>
            <option value="golden hour sunset">해질녘</option>
            <option value="blue hour twilight">블루아워</option>
            <option value="night">밤</option>
          </select>
        </div>
        <div class="adv-item adv-full">
          <label>추가 디렉션</label>
          <input type="text" id="advExtra" placeholder="예: 안개가 자욱한, 사람이 없는, 축제 분위기..." class="free-input" style="height:auto;">
        </div>
      </div>
    </details>

    <div class="btn-row" style="justify-content:center;">
      <button class="btn btn-generate" onclick="generatePrompts()">
        프롬프트 생성하기
      </button>
    </div>
  </div>

  <!-- ========== STEP 4: 결과 ========== -->
  <div class="section" id="step4">
    <button class="back-link" onclick="goStep(3)">← 설정으로</button>
    <div class="section-title" id="resultTitle">생성된 프롬프트</div>

    <div class="results-area" id="resultsArea"></div>

    <div class="download-section">
      <h3>전체 프롬프트 저장하기</h3>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-secondary" onclick="downloadTxt()">텍스트 파일 (.txt) 다운로드</button>
        <button class="btn btn-secondary" onclick="downloadJson()">JSON 파일 다운로드</button>
      </div>
    </div>

    <div class="btn-row" style="justify-content:center;">
      <button class="btn btn-primary" onclick="resetAndGoStep1()">처음부터 다시</button>
      <button class="btn btn-secondary" onclick="goStep(3)">설정 바꿔서 다시 생성</button>
    </div>
  </div>

</div>

  {id:"hwaseong-haenggung",name:"수원 화성행궁",nameEn:"Hwaseong Haenggung Palace",type:"사적",category:"건축",era:"조선",eraEn:"Joseon Dynasty (1796)",location:"경기도 수원시",desc:"정조가 아버지 사도세자 능 행차 시 머문 임시 궁궐. 화성 성곽 안의 가장 큰 행궁으로, 왕실 행차의 위엄과 효심이 깃든 공간이다.",visual:{style:["temporary palace complex","royal procession hall","traditional gate"],colors:["dancheong red-green","grey roof tiles","white stone base"],materials:["pine wood","granite","dancheong pigments"],atmosphere:"아버지를 향한 정조의 효심이 서린 행궁의 고즈넉한 아침"}},
  {id:"jagyeongjeon-chimney",name:"경복궁 자경전 십장생 굴뚝",nameEn:"Ten Longevity Symbols Chimney Jagyeongjeon",type:"보물",category:"건축",era:"조선",eraEn:"Joseon Dynasty",location:"서울 종로구",desc:"자경전 담장의 십장생 무늬 굴뚝. 해, 산, 물, 구름, 소나무, 학, 사슴, 거북, 불로초, 대나무를 새겼다. 궁궐 장식 예술의 백미로 꼽힌다.",visual:{style:["ten longevity symbols wall","decorative chimney relief","palace fence"],colors:["orange-red brick","grey stone relief","brown earth tones"],materials:["carved brick","stone","roof tile"],atmosphere:"열 가지 장수 상징이 벽면에 새겨진 궁궐 장식의 백미"}},
  {id:"jeju-haenyeo",name:"제주 해녀",nameEn:"Jeju Haenyeo Sea Women",type:"유네스코 무형문화유산",category:"생활·풍속",era:"근대",eraEn:"Modern Era",location:"제주특별자치도",desc:"산소 장비 없이 바다에 잠수하여 해산물을 채취하는 제주 여성 잠수부. 강인한 어머니의 상징이자, 제주 공동체 문화의 핵심이다.",visual:{style:["diving woman in wetsuit","tewak float","underwater harvest"],colors:["black wetsuit","orange tewak float","turquoise sea"],materials:["rubber wetsuit","gourd float","net bag"],atmosphere:"거친 파도 속으로 뛰어드는 제주 어머니들의 강인한 삶"}},
  {id:"cheonsang-yeolcha-bunyajido",name:"천상열차분야지도",nameEn:"Cheonsang Yeolcha Bunyajido Star Map",type:"국보",category:"도자기·공예",era:"조선",eraEn:"Joseon Dynasty (1395)",location:"국립고궁박물관",desc:"조선 태조 때 제작된 천문도. 1,467개의 별을 돌에 새긴 세계에서 두 번째로 오래된 석각 천문도. 조선의 과학 수준을 보여주는 걸작이다.",visual:{style:["stone-carved star chart","celestial map","constellation circles"],colors:["dark stone black","white star dots","carved line grey"],materials:["black marble stone","carved inlay"],atmosphere:"1,467개 별이 새겨진 돌 위의 조선의 하늘"}},
  {id:"changdeokgung-huwon",name:"창덕궁 후원",nameEn:"Huwon Secret Garden Changdeokgung",type:"세계문화유산",category:"자연유산",era:"조선",eraEn:"Joseon Dynasty",location:"서울 종로구",desc:"창덕궁 뒤편의 왕실 정원. 부용지와 주합루, 자연 지형을 살린 한국 전통 정원의 정수. 사계절마다 다른 풍경을 선사한다.",visual:{style:["lotus pond pavilion","Buyongji pond","Juhamnu library","forest canopy"],colors:["pond reflection green","pavilion red-brown","autumn gold","sky blue"],materials:["natural stone","pine wood","lotus"],atmosphere:"자연과 건축이 하나 되는 왕의 비밀 정원, 사계의 풍류"}},
  {id:"goryeo-bronze-mirror",name:"고려 청동거울",nameEn:"Goryeo Bronze Mirror",type:"보물",category:"도자기·공예",era:"고려",eraEn:"Goryeo Dynasty",location:"국립중앙박물관",desc:"뒷면에 정교한 문양을 새긴 고려시대 청동 거울. 쌍봉문, 당초문 등 섬세한 조각이 특징이다. 고려 금속 공예의 높은 수준을 증명한다.",visual:{style:["circular bronze mirror","engraved back pattern","twin phoenix design"],colors:["bronze patina green","dark copper brown","golden highlights"],materials:["bronze alloy","polished surface"],atmosphere:"천년 녹청 아래 드러나는 고려 장인의 섬세한 조각"}},
  {id:"seodongyo",name:"서동요와 무왕",nameEn:"Seodongyo Song of Seodong",type:"문화유산",category:"생활·풍속",era:"백제",eraEn:"Baekje Kingdom (600)",location:"전라북도 익산시",desc:"백제 무왕과 신라 선화공주의 사랑 설화. 한국 최초의 4구체 향가로 전해지는 노래. 삼국 시대 로맨스의 대표적 이야기이다.",visual:{style:["ancient love story scene","prince in commoner clothes","lotus pond"],colors:["moonlight silver","hanbok pastel","lotus pink"],materials:["silk garments","lotus flowers","moonlight"],atmosphere:"백제 서동과 신라 공주의 달빛 아래 설화적 사랑"}},
  {id:"ottchil-lacquerware",name:"전통 옻칠",nameEn:"Traditional Ottchil Lacquerware",type:"국가무형문화재",category:"도자기·공예",era:"조선",eraEn:"Joseon Dynasty",location:"전국 (원주·남원)",desc:"옻나무 수액으로 칠하는 전통 도장법. 방수·방충 효과와 깊은 광택의 칠기 공예. 수십 번 덧칠하여 완성하는 인내의 예술이다.",visual:{style:["lacquered wooden box","glossy black surface","mother-of-pearl inlay"],colors:["deep lacquer black","vermilion red","amber brown"],materials:["lacquer sap","wooden base","hemp cloth"],atmosphere:"겹겹이 쌓인 칠의 깊이에서 우러나는 은은한 윤기"}},
  {id:"seongeup-folk-village",name:"제주 성읍민속마을",nameEn:"Seongeup Folk Village Jeju",type:"국가민속문화재",category:"건축",era:"조선",eraEn:"Joseon Dynasty",location:"제주 서귀포시 표선면",desc:"제주 전통 초가집과 돌담이 보존된 민속 마을. 정의현의 옛 읍성 마을 원형이 남아있다. 제주 전통 생활상을 생생히 전한다.",visual:{style:["thatched roof houses","stone walls","village road","harubang statue"],colors:["straw thatch golden","basalt dark grey","green mandarin trees"],materials:["volcanic stone","thatch straw","wooden pillar"],atmosphere:"현무암 돌담 사이로 이어지는 제주 옛 마을의 바람길"}},
  {id:"hansan-mosi",name:"한산 모시짜기",nameEn:"Hansan Mosi Fine Ramie Weaving",type:"유네스코 무형문화유산",category:"생활·풍속",era:"조선",eraEn:"Joseon Dynasty",location:"충청남도 서천군",desc:"모시풀에서 실을 뽑아 짜는 전통 직물. 투명할 만큼 곱고 시원한 여름 옷감의 대명사. 유네스코가 인정한 한국의 직조 유산이다.",visual:{style:["ramie fiber stripping","hand weaving loom","translucent fabric"],colors:["natural ivory white","pale beige","cool grey"],materials:["ramie plant fiber","wooden loom","starch paste"],atmosphere:"한 올 한 올 이어 짠 투명한 여름 옷감의 서늘한 품격"}},
  {id:"yeongsanjae",name:"영산재",nameEn:"Yeongsanje Buddhist Ritual",type:"유네스코 무형문화유산",category:"불교",era:"조선",eraEn:"Joseon Dynasty",location:"서울 봉원사 등",desc:"부처가 영축산에서 법화경을 설한 것을 재현하는 불교 의식. 범패, 작법무 등이 어우러진 종합 의례. 한국 불교 의식의 정수이다.",visual:{style:["Buddhist ritual ceremony","monk chanting","butterfly dance","lotus offering"],colors:["saffron monk robe","white ritual costume","golden altar"],materials:["Buddhist altar items","incense","silk banners"],atmosphere:"범패 소리와 나비춤이 어우러지는 장엄한 불교 의례의 순간"}},
  {id:"gaya-pottery",name:"가야 토기",nameEn:"Gaya Pottery",type:"보물",category:"도자기·공예",era:"가야",eraEn:"Gaya Confederacy (42-562)",location:"경상남도 김해·합천",desc:"가야 연맹의 회청색 경질 토기. 오리, 배, 기마 인물 등 독특한 형상 토기가 특징이다. 가야인의 삶과 상상력이 빚어낸 걸작이다.",visual:{style:["grey stoneware","duck-shaped vessel","mounted warrior figurine"],colors:["blue-grey stoneware","charcoal black","ash white"],materials:["high-fired clay","natural ash glaze"],atmosphere:"독특한 형상 속에 가야인의 삶과 상상력이 빚어진 토기"}},
  {id:"poseokjeong",name:"경주 포석정",nameEn:"Poseokjeong Pavilion Site Gyeongju",type:"사적",category:"자연유산",era:"통일신라",eraEn:"Unified Silla",location:"경상북도 경주시",desc:"전복 모양의 돌 수로에 술잔을 띄워 보내며 시를 읊던 신라 왕실의 풍류 유적. 곡수연의 전통을 보여주는 독보적 유산이다.",visual:{style:["abalone-shaped stone channel","garden pavilion site","flowing water stone"],colors:["weathered granite grey","moss green","garden earth brown"],materials:["carved granite channel","natural stone"],atmosphere:"술잔이 흐르는 돌 수로 위의 신라 귀족 풍류"}},
  {id:"nakseonjae",name:"창덕궁 낙선재",nameEn:"Nakseonjae Changdeokgung",type:"사적",category:"건축",era:"조선",eraEn:"Joseon Dynasty (1847)",location:"서울 종로구",desc:"조선 헌종의 서재 겸 거처. 단청 없이 소박한 아름다움을 보여주는 조선 후기 사대부풍 건축. 절제된 미감이 돋보이는 공간이다.",visual:{style:["unpainted wooden palace","scholar's study","lattice window","simple garden"],colors:["natural wood warm brown","white paper doors","grey roof tiles"],materials:["pine wood","hanji paper","granite base"],atmosphere:"단청 없는 목재의 결이 드러나는 조선 선비의 고즈넉한 서재"}},
  {id:"dwijoji-hairpin",name:"전통 장신구 뒤꽂이",nameEn:"Dwijoji Traditional Hairpin",type:"국가민속문화재",category:"도자기·공예",era:"조선",eraEn:"Joseon Dynasty",location:"국립민속박물관",desc:"쪽진 머리에 꽂는 조선 여성의 장식용 비녀. 나비, 봉황, 매화 등을 금은으로 세공한다. 조선 여인의 미적 감각이 담긴 소품이다.",visual:{style:["ornamental hairpin","butterfly motif","phoenix design","floral metalwork"],colors:["gold filigree","silver","coral red accent"],materials:["gold","silver","jade","coral"],atmosphere:"곱게 쪽진 머리 위에 빛나는 금은 세공의 작은 예술"}},

  {id:"taekkyeon",name:"택견",nameEn:"Taekkyeon",type:"무형문화재",category:"생활·풍속",era:"조선",eraEn:"Joseon Dynasty",location:"충청남도",desc:"부드러운 곡선 동작이 특징인 한국 전통 무예. 품밟기라는 삼각 보법과 유연한 발기술이 핵심.",visual:{style:["fluid martial arts movement","triangular footwork","leg sweep"],colors:["white traditional outfit","earthy ground brown","sky blue"],materials:["cotton hanbok","bare feet","open field"],atmosphere:"부드럽지만 날카로운 곡선의 움직임, 춤과 무예의 경계"}},
  {id:"gukgung",name:"국궁",nameEn:"Gukgung Korean Traditional Archery",type:"무형문화재",category:"생활·풍속",era:"전시대",eraEn:"All Eras",location:"전국",desc:"한국 전통 활쏘기. 짧은 각궁으로 145m 거리의 과녁을 맞추는 정신 수양의 무예.",visual:{style:["composite horn bow","archer in hanbok","archery range","arrow release"],colors:["bow natural wood brown","target red-white","hanbok white"],materials:["water buffalo horn bow","bamboo arrow","silk bowstring"],atmosphere:"시위를 떠난 화살의 궤적, 145보 저편의 적중"}},
  {id:"honcheoni",name:"혼천의",nameEn:"Honcheoni Armillary Sphere",type:"국보",category:"도자기·공예",era:"조선",eraEn:"Joseon Dynasty (1669)",location:"고려대학교 박물관",desc:"천체의 운행을 관측하고 시각을 알려주는 조선시대 천문 기구. 송이영이 제작한 자동 물시계 겸용 천문의기.",visual:{style:["brass armillary rings","celestial globe","mechanical clock mechanism"],colors:["brass golden","dark iron brown","wooden base warm brown"],materials:["brass rings","iron gears","wooden housing"],atmosphere:"톱니바퀴로 하늘을 읽는 조선 과학의 정밀한 아름다움"}},
  {id:"cheonmachong-tomb",name:"경주 대릉원 천마총",nameEn:"Cheonmachong Tomb Gyeongju",type:"사적",category:"건축",era:"신라",eraEn:"Silla Kingdom (5-6th c.)",location:"경상북도 경주시",desc:"천마도 장니가 출토된 신라 고분. 금관, 금허리띠 등 화려한 부장품과 하늘을 나는 천마 그림.",visual:{style:["large burial mound","golden crown artifact","flying horse painting"],colors:["grass-covered green mound","gold crown gleam","birch bark white"],materials:["earth mound","gold crown","birch bark painting"],atmosphere:"봉분 아래 잠든 신라 왕의 금빛 세계와 하늘을 나는 말"}},
  {id:"jokduri-hwagwan",name:"전통 족두리와 화관",nameEn:"Jokduri and Hwagwan Bridal Crown",type:"무형문화재",category:"생활·풍속",era:"조선",eraEn:"Joseon Dynasty",location:"전국",desc:"조선 여성의 혼례 머리 장식. 족두리는 검은 비단의 작은 관, 화관은 꽃으로 장식한 화려한 예관.",visual:{style:["black silk crown","floral ceremonial headpiece","wedding hanbok"],colors:["black silk","gold filigree flowers","coral and jade accents"],materials:["silk","gold wire flowers","jade","coral beads"],atmosphere:"혼례날 신부의 머리 위에 피어나는 금빛 꽃들의 장관"}},
  {id:"yeondeunghoe",name:"연등회",nameEn:"Yeondeunghoe Lotus Lantern Festival",type:"유네스코 무형문화유산",category:"불교",era:"고려~조선",eraEn:"Goryeo-Joseon",location:"서울 전국",desc:"부처님오신날을 기념하는 연등 축제. 수만 개의 연꽃 등이 거리를 밝히는 한국 대표 불교 축제.",visual:{style:["lotus lantern parade","colorful paper lanterns","night procession"],colors:["lantern warm yellow glow","pink lotus","green leaves","night blue"],materials:["hanji paper lanterns","bamboo frame","candle light"],atmosphere:"수만 개의 연꽃 등불이 밤거리를 환하게 물들이는 빛의 행렬"}},
  {id:"sambe-weaving",name:"전통 삼베짜기",nameEn:"Traditional Hempen Cloth Sambe Weaving",type:"무형문화재",category:"생활·풍속",era:"전시대",eraEn:"All Eras",location:"경상북도 안동시",desc:"대마 섬유로 짜는 전통 직물. 상복과 여름옷감으로 사용되며 안동 삼베가 유명.",visual:{style:["hemp fiber spinning","hand loom weaving","raw fabric texture"],colors:["natural hemp beige","warm ivory","golden straw"],materials:["hemp fiber","wooden loom","spinning wheel"],atmosphere:"물레 소리와 함께 한 올 한 올 이어지는 삼베의 거친 질감"}},
  {id:"oeam-village",name:"외암마을",nameEn:"Oeam Folk Village",type:"중요민속문화재",category:"건축",era:"조선",eraEn:"Joseon Dynasty",location:"충청남도 아산시",desc:"500년 역사의 반촌 전통마을. 양반가와 초가집이 돌담으로 이어지는 조선 마을 원형.",visual:{style:["thatched and tiled houses","stone wall paths","village landscape"],colors:["straw thatch golden","grey roof tiles","stone wall brown-grey"],materials:["stone walls","pine timber","thatch straw","clay tiles"],atmosphere:"돌담길 사이로 양반가와 초가가 어우러진 500년 마을"}},

function translateToEn(text) {
  let result = text;
  const sortedKeys = Object.keys(KO_EN_MAP).sort((a, b) => b.length - a.length);
  for (const ko of sortedKeys) {
    result = result.split(ko).join(KO_EN_MAP[ko]);
  }
  return result;
}

// ── 자유입력 재구성 함수 ──
function composeFreeText(freeText, sceneId, sensitivity, cameraView) {
  if (!freeText) return { en: "", ko: "" };

  const dir = SCENE_DIRECTION[sceneId] || SCENE_DIRECTION.landscape;
  const sens = SENSITIVITIES[sensitivity] || SENSITIVITIES.editorial;
  const colorGrade = sens.colorGrade?.[sceneId] || sens.colorGrade?.landscape || "";

  // 영문: 씬 디렉션 + 자유입력(그대로) + 감도 수식어 + 컬러 그레이딩 + 뷰
  const enParts = [];
  enParts.push(dir.en.join(", "));
  enParts.push(freeText);
  if (colorGrade) enParts.push(colorGrade);
  if (cameraView) enParts.push(`${cameraView} perspective`);

  // 한글: 씬 디렉션 + 자유입력 + 뷰
  const koParts = [];
  koParts.push(dir.ko.join(", "));
  koParts.push(freeText);
  if (cameraView) {
    const camEl = document.getElementById("advCamera");
    if (camEl && camEl.selectedOptions[0]) koParts.push(camEl.selectedOptions[0].text + " 구도");
  }

  return {
    en: enParts.filter(Boolean).join(", "),
    ko: koParts.filter(Boolean).join(". ")
  };
}

function getAdvancedSettings() {
  const camera = document.getElementById("advCamera")?.value || "";

  const season = document.getElementById("advSeason")?.value || "";
  const time = document.getElementById("advTime")?.value || "";
  const extra = document.getElementById("advExtra")?.value?.trim() || "";
  return { camera, lens, lighting, season, time, extra };
}

function buildEnPrompt(item, sceneId, sensitivity, freeText) {
  const v = item.visual;
  const perf = isPerformance(item);
  const scene = SCENE_PROMPT[sceneId]?.en || "view of";
  const sens = SENSITIVITIES[sensitivity] || SENSITIVITIES.editorial;
  const adv = getAdvancedSettings();
  const arSelect = document.getElementById("aspectRatio");
  const ar = arSelect ? ASPECT_RATIOS.find(a => a.id === arSelect.value) : ASPECT_RATIOS[0];

  const parts = [];
  // 1. 씬 + 주제 (영문 변환)
  parts.push(`${scene} ${item.nameEn}, ${item.eraEn}, Korean cultural heritage`);
  // 2. 시각 디테일 — translateToEn으로 한글→영문 자동 변환
  const stylesEn = v.style.slice(0,4).map(s => translateToEn(s)).join(", ");
  const colorsEn = v.colors.map(c => translateToEn(c)).join(", ");
  const materialsEn = v.materials.map(m => translateToEn(m)).join(", ");
  parts.push(`featuring ${stylesEn}, color palette of ${colorsEn}, textures of ${materialsEn}`);
  // 3. 분위기 (번역)
  parts.push(translateToEn(v.atmosphere));
  // 4. 자유입력 재구성 (씬+감도+뷰 기반)
  const composed = composeFreeText(freeText, sceneId, sensitivity, adv.camera);
  if (composed.en) parts.push(composed.en);
  // 5. 감도 수식어
  parts.push(sens.promptEn);
  // 6. 컬러 그레이딩
  const colorGrade = sens.colorGrade?.[sceneId] || sens.colorGrade?.landscape || "";
  if (colorGrade) parts.push(colorGrade);
  // 7. 공연 에너지
  if (perf) parts.push(getEnergyContext(item).en);
  // 8. 고급 설정
  if (adv.lens) parts.push(`shot on ${adv.lens}`);
  if (adv.lighting) parts.push(adv.lighting);
  if (adv.season) parts.push(adv.season);
  if (adv.time) parts.push(adv.time);
  if (adv.extra) parts.push(adv.extra);
  // 9. 퀄리티
  parts.push("highly detailed, 8K, professional quality");

  return parts.join(", ") + " " + ar.mj;
}

function buildKoPrompt(item, sceneId, sensitivity, freeText) {
  const v = item.visual;
  const perf = isPerformance(item);
  const scene = SCENE_PROMPT[sceneId]?.ko || "";
  const sens = SENSITIVITIES[sensitivity] || SENSITIVITIES.editorial;
  const adv = getAdvancedSettings();
  const arSelect = document.getElementById("aspectRatio");
  const ar = arSelect ? ASPECT_RATIOS.find(a => a.id === arSelect.value) : ASPECT_RATIOS[0];

  const parts = [];
  parts.push(`${item.era} 시대 한국 문화유산 "${item.name}"의 이미지를 생성해주세요`);
  parts.push(`${scene} 장면입니다`);
  parts.push(`주요 시각 요소는 ${v.style.join(", ")}이며, ${v.colors.join(", ")} 색감을 사용합니다`);
  parts.push(`재질은 ${v.materials.join(", ")}으로 구성됩니다`);
  parts.push(`전체 분위기는 ${v.atmosphere}`);
  // 자유입력 재구성 (한글)
  const composed = composeFreeText(freeText, sceneId, sensitivity, adv.camera);
  if (composed.ko) parts.push(composed.ko);
  // 감도
  parts.push(`${sens.promptKo} 스타일로 표현해주세요`);
  if (perf) {
    parts.push(getEnergyContext(item).ko);
    parts.push("공연의 역동적 에너지와 관객의 호응이 생생하게 느껴지도록 표현해주세요");
  }
  // 고급 설정 (한글)
  const advParts = [];
  if (adv.season) advParts.push(document.getElementById("advSeason").selectedOptions[0].text.replace(/ \(.*\)/, ""));
  if (adv.time) advParts.push(document.getElementById("advTime").selectedOptions[0].text);
  if (adv.lighting) advParts.push(document.getElementById("advLighting").selectedOptions[0].text);
  if (advParts.length) parts.push(advParts.join(", ") + " 분위기");
  if (adv.extra) parts.push(adv.extra);
  // 종횡비
  parts.push(ar.ko);

  return parts.join(". ") + ".";
}

function initAspectRatio() {
  const select = document.getElementById("aspectRatio");
  if (!select) return;
  const updatePreview = () => {
    const box = document.getElementById("aspectBox");
    if (!box) return;
    const ratios = { "1:1": [32,32], "4:5": [28,35], "2:3": [24,36], "16:9": [42,24], "9:16": [20,36] };
    const [w,h] = ratios[select.value] || [32,32];
    box.style.width = w + "px";
    box.style.height = h + "px";
  };
  select.addEventListener("change", updatePreview);
  updatePreview();
}

function renderCategories() {
  const cats = ["전체", ...new Set(HERITAGE_DB.map(h => h.category))];
  const el = document.getElementById("categoryTabs");
  el.innerHTML = cats.map(c =>
    `<div class="cat-tab ${c==='전체'?'active':''}" onclick="filterCategory('${c}')">${c}</div>`

}

function filterCategory(cat) {
  currentCategory = cat;
  visibleCount = PAGE_SIZE;
  document.querySelectorAll(".cat-tab").forEach(t => t.classList.toggle("active", t.textContent === cat));
  renderHeritage();
}

function getFilteredItems() {
  let items = currentCategory === "전체" ? HERITAGE_DB : HERITAGE_DB.filter(h => h.category === currentCategory);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(h =>
      h.name.toLowerCase().includes(q) ||
      h.nameEn.toLowerCase().includes(q) ||
      h.era.includes(q) ||
      h.location.includes(q) ||
      h.desc.includes(q)
    );
  }
  return items;
}

function renderHeritage() {
  const items = getFilteredItems();
  const visible = items.slice(0, visibleCount);
  const grid = document.getElementById("heritageGrid");
  grid.innerHTML = visible.map(h => `
    <div class="heritage-card ${selectedHeritage?.id===h.id?'selected':''}" onclick="selectHeritage('${h.id}')">
      <span class="card-type">${h.type}</span>
      <div class="card-name">${h.name}</div>
      <div class="card-name-en">${h.nameEn}</div>
      <div class="card-meta">
        <span class="card-era">${h.era}</span>
        <span class="card-era">${h.location}</span>
      </div>
      <div class="card-desc">${h.desc}</div>
    </div>
  `).join("");

  const wrap = document.getElementById("loadMoreWrap");
  const countEl = document.getElementById("itemCount");
  if (items.length > visibleCount) {
    wrap.style.display = "block";
    countEl.textContent = `${visibleCount} / ${items.length}개 표시 중`;
  } else {
    wrap.style.display = items.length > 0 ? "block" : "none";
    countEl.textContent = items.length > 0 ? `전체 ${items.length}개` : "";
    wrap.querySelector(".load-more-btn").style.display = items.length > visibleCount ? "inline-block" : "none";
  }
}

function loadMore() {
  visibleCount += PAGE_SIZE;
  renderHeritage();
}

function onSearchInput() {

let currentStep = 1;
const STEP_NAMES = ["", "유산 선택", "씬 타입", "프롬프트 설정", "결과 확인"];

function goStep(n) {
  const isBack = n < currentStep;
  const prev = document.querySelector(".section.visible");

  // 슬라이드 아웃
  if (prev) {
    prev.classList.remove("visible");
    prev.classList.add("slide-out");
    setTimeout(() => prev.classList.remove("slide-out"), 300);
  }

  // 슬라이드 인
  setTimeout(() => {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("visible", "reverse"));
    const next = document.getElementById(`step${n}`);
    next.classList.add("visible");
    if (isBack) next.classList.add("reverse");
  }, isBack ? 150 : 100);

  currentStep = n;

  // 스텝 인디케이터 업데이트
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById(`dot${i}`);
    dot.classList.remove("active", "done");
    if (i < n) dot.classList.add("done");
    if (i === n) dot.classList.add("active");
  }
  document.getElementById("stepLabel").innerHTML =
    `<strong>Step ${n}/4</strong> · ${STEP_NAMES[n]}`;

  // 선택값 뱃지 업데이트
  updateBadges(n);

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function updateBadges(step) {
  const badges = document.getElementById("selectionBadges");
  let html = "";
  if (step >= 2 && selectedHeritage) {
    html += `<span class="sel-badge">${selectedHeritage.name}</span>`;
  }
  if (step >= 3 && selectedScene) {
    const scene = SCENE_TYPES.find(s => s.id === selectedScene);
    if (scene) html += `<span class="sel-badge">${scene.name}</span>`;
  }
  if (step >= 4 && selectedSensitivity) {
    const sensNames = { editorial: "에디토리얼", cinematic: "시네마틱", campaign: "캠페인" };
    html += `<span class="sel-badge">${sensNames[selectedSensitivity] || selectedSensitivity}</span>`;
  }
  badges.innerHTML = html;
}

function resetAndGoStep1() {
  selectedHeritage = null;
  selectedScene = null;
  selectedSensitivity = "editorial";
  document.querySelectorAll(".heritage-card").forEach(c => c.classList.remove("selected"));
  document.querySelectorAll(".sens-btn").forEach(b => b.classList.toggle("active", b.dataset.val === "editorial"));
  if (document.getElementById("freeInput")) document.getElementById("freeInput").value = "";
  goStep(1);
}


// ══════════════════════════════════════════════
// 프롬프트 생성
// ══════════════════════════════════════════════

function generatePrompts() {
  if (!selectedHeritage || !selectedScene) return;
  const item = selectedHeritage;
  const freeText = document.getElementById("freeInput")?.value?.trim() || "";
  generatedPrompts = [];

  document.getElementById("resultTitle").textContent = `${item.name} — 생성된 프롬프트`;

  const area = document.getElementById("resultsArea");
  let html = "";
  const sceneName = SCENE_TYPES.find(s => s.id === selectedScene)?.name || "";
  const sensLabel = SENSITIVITIES[selectedSensitivity]?.label || "";

  // 고증 상세 정보
  html += `<div class="result-block">
    <div class="result-header">
      <h3>📋 ${item.name} 고증 정보</h3>
      <span class="tag">${item.type} · ${item.era}</span>
    </div>
    <div class="result-body">
      <p style="margin-bottom:1rem;color:var(--color-ink-soft);font-size:0.9rem;">${item.desc}</p>
      <div class="detail-grid">
        <div class="detail-item">
          <div class="label">시대</div>
          <div class="value">${item.era} (${item.eraEn})</div>
          ${ERA_CONTEXT[item.era] ? `<div class="value" style="margin-top:0.3rem;font-size:0.78rem;color:var(--color-ink-soft)">${ERA_CONTEXT[item.era]}</div>` : ""}
        </div>
        <div class="detail-item">
          <div class="label">양식 · 구조</div>
          <div class="tag-list">${item.visual.style.map(s => `<span class="mini-tag">${s}</span>`).join("")}</div>
        </div>
        <div class="detail-item">
          <div class="label">색상 팔레트</div>
          <div class="tag-list">${item.visual.colors.map(c => `<span class="mini-tag">${c}</span>`).join("")}</div>
        </div>
        <div class="detail-item">
          <div class="label">재질 · 소재</div>
          <div class="tag-list">${item.visual.materials.map(m => `<span class="mini-tag">${m}</span>`).join("")}</div>
        </div>
      </div>
    </div>
  </div>`;

  // 영문 프롬프트
  const promptEn = buildEnPrompt(item, selectedScene, selectedSensitivity, freeText);
  // 한글 프롬프트
  const promptKo = buildKoPrompt(item, selectedScene, selectedSensitivity, freeText);

  generatedPrompts.push({
    scene: sceneName,
    sensitivity: sensLabel,
    promptEn: promptEn,
    promptKo: promptKo
  });

  // 영문 프롬프트 카드
  html += `<div class="result-block">
    <div class="result-header">
      <h3>${sceneName} · ${sensLabel}</h3>
      <span class="tag">영문 프롬프트</span>
    </div>
    <div class="result-body">
      <div class="prompt-box">
        <div class="prompt-label">English — Midjourney, Stable Diffusion 등에 사용</div>
        <div class="prompt-text" id="prompt-en">${promptEn}</div>
        <button class="copy-btn" onclick="copyPrompt('prompt-en', this)">복사</button>
      </div>
    </div>
  </div>`;

  // 한글 프롬프트 카드
  html += `<div class="result-block">
    <div class="result-header">
      <h3>${sceneName} · ${sensLabel}</h3>
      <span class="tag">한글 프롬프트</span>
    </div>
    <div class="result-body">
      <div class="prompt-box">
        <div class="prompt-label">한글 — 나노바나나(Gemini) 등에 사용</div>
        <div class="prompt-text" id="prompt-ko">${promptKo}</div>
        <button class="copy-btn" onclick="copyPrompt('prompt-ko', this)">복사</button>
      </div>
    </div>
  </div>`;

  area.innerHTML = html;
  goStep(4);
}


// ══════════════════════════════════════════════
// 복사 & 다운로드
// ══════════════════════════════════════════════

function copyPrompt(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "복사됨!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "복사";
      btn.classList.remove("copied");
    }, 2000);
  });
}

function downloadTxt() {
  if (!selectedHeritage || generatedPrompts.length === 0) return;
  let txt = `${selectedHeritage.name} (${selectedHeritage.nameEn})\n`;
  txt += `${selectedHeritage.type} | ${selectedHeritage.era} | ${selectedHeritage.category}\n`;
  txt += "=".repeat(60) + "\n\n";

  for (const p of generatedPrompts) {
    txt += `[${p.scene} · ${p.sensitivity} — 영문]\n${p.promptEn}\n\n`;
    txt += `[${p.scene} · ${p.sensitivity} — 한글]\n${p.promptKo}\n\n`;
    txt += "-".repeat(40) + "\n\n";
  }

  const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${selectedHeritage.name}_프롬프트.txt`;
  a.click();
}

function downloadJson() {
  if (!selectedHeritage || generatedPrompts.length === 0) return;
  const data = {
    heritage: {
      name: selectedHeritage.name,
      nameEn: selectedHeritage.nameEn,
      type: selectedHeritage.type,
      era: selectedHeritage.era,
      category: selectedHeritage.category,
      visual: selectedHeritage.visual
    },
    prompts: generatedPrompts
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${selectedHeritage.name}_프롬프트.json`;
  a.click();
}

// 초기화
init();
</script>
