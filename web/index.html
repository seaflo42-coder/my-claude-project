<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국 문화유산 AI 이미지 프롬프트 생성기</title>
<style>
/* ── 기본 리셋 & 변수 ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f13;
  --bg2: #1a1a24;
  --bg3: #252533;
  --accent: #c9a96e;
  --accent2: #e8d5a8;
  --text: #e8e6e1;
  --text2: #a09e99;
  --red: #c75c5c;
  --green: #6dbc7a;
  --blue: #5c8dc7;
  --radius: 12px;
}
body {
  font-family: 'Pretendard', -apple-system, 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── 헤더 ── */
.header {
  background: linear-gradient(135deg, #1a1520 0%, #20182a 50%, #18151f 100%);
  border-bottom: 1px solid rgba(201,169,110,0.2);
  padding: 2rem;
  text-align: center;
}
.header h1 {
  font-size: 1.8rem;
  color: var(--accent2);
  font-weight: 700;
  letter-spacing: -0.5px;
}
.header p {
  color: var(--text2);
  margin-top: 0.5rem;
  font-size: 0.95rem;
}
.header .badge {
  display: inline-block;
  background: rgba(201,169,110,0.15);
  color: var(--accent);
  padding: 0.25rem 0.75rem;
  border-radius: 20px;
  font-size: 0.8rem;
  margin-top: 0.75rem;
  border: 1px solid rgba(201,169,110,0.2);
}

/* ── 메인 레이아웃 ── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* ── 단계 표시 ── */
.steps {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}
.step {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: var(--bg2);
  border-radius: 25px;
  font-size: 0.85rem;
  color: var(--text2);
  border: 1px solid transparent;
  transition: all 0.3s;
}
.step.active {
  background: rgba(201,169,110,0.15);
  color: var(--accent2);
  border-color: rgba(201,169,110,0.3);
}
.step.done {
  color: var(--green);
}
.step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
}
.step.active .step-num { background: var(--accent); color: var(--bg); }
.step.done .step-num { background: var(--green); color: var(--bg); }

/* ── 섹션 공통 ── */
.section {
  display: none;
  animation: fadeIn 0.4s ease;
}
.section.visible { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.section-title {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
  color: var(--accent2);
}

/* ── 카테고리 탭 ── */
.category-tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.cat-tab {
  padding: 0.5rem 1rem;
  border-radius: 8px;
  border: 1px solid var(--bg3);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.cat-tab:hover { border-color: var(--accent); color: var(--accent); }
.cat-tab.active {
  background: rgba(201,169,110,0.15);
  border-color: var(--accent);
  color: var(--accent2);
}

/* ── 문화유산 카드 그리드 ── */
.heritage-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}
.heritage-card {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: var(--radius);
  padding: 1.25rem;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}
.heritage-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}
.heritage-card.selected {
  border-color: var(--accent);
  background: rgba(201,169,110,0.08);
  box-shadow: 0 0 0 1px var(--accent);
}
.heritage-card .card-type {
  display: inline-block;
  font-size: 0.7rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  background: rgba(201,169,110,0.15);
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.heritage-card .card-name {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
}
.heritage-card .card-name-en {
  font-size: 0.8rem;
  color: var(--text2);
  margin-bottom: 0.5rem;
}
.heritage-card .card-meta {
  font-size: 0.8rem;
  color: var(--text2);
}
.heritage-card .card-era {
  display: inline-block;
  font-size: 0.75rem;
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text2);
  margin-right: 0.25rem;
}
.heritage-card .card-desc {
  font-size: 0.82rem;
  color: var(--text2);
  margin-top: 0.75rem;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── 스타일/모델 선택 ── */
.option-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.option-card {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: var(--radius);
  padding: 1.25rem;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
}
.option-card:hover { border-color: var(--accent); }
.option-card.selected {
  border-color: var(--accent);
  background: rgba(201,169,110,0.08);
}
.option-card .opt-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.option-card .opt-name { font-weight: 700; margin-bottom: 0.25rem; }
.option-card .opt-desc { font-size: 0.8rem; color: var(--text2); }

/* ── 버튼 ── */
.btn-row {
  display: flex;
  gap: 0.75rem;
  margin-top: 2rem;
  flex-wrap: wrap;
}
.btn {
  padding: 0.75rem 2rem;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--accent);
  color: var(--bg);
}
.btn-primary:hover { background: var(--accent2); }
.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-secondary {
  background: var(--bg3);
  color: var(--text);
}
.btn-secondary:hover { background: #303044; }
.btn-generate {
  background: linear-gradient(135deg, #c9a96e, #e8d5a8);
  color: var(--bg);
  padding: 1rem 3rem;
  font-size: 1.1rem;
  border-radius: 10px;
}
.btn-generate:hover {
  box-shadow: 0 6px 20px rgba(201,169,110,0.3);
  transform: translateY(-1px);
}

/* ── 결과 영역 ── */
.results-area {
  margin-top: 1rem;
}
.result-block {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: var(--radius);
  margin-bottom: 1.25rem;
  overflow: hidden;
}
.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.25rem;
  background: var(--bg3);
  cursor: pointer;
}
.result-header h3 {
  font-size: 0.95rem;
  font-weight: 600;
}
.result-header .tag {
  font-size: 0.75rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  background: rgba(201,169,110,0.2);
  color: var(--accent);
}
.result-body {
  padding: 1.25rem;
}
.prompt-box {
  background: var(--bg);
  border: 1px solid var(--bg3);
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 1rem;
  position: relative;
}
.prompt-label {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.prompt-text {
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--text);
  word-break: break-all;
  white-space: pre-wrap;
}
.copy-btn {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  background: var(--bg3);
  border: 1px solid rgba(201,169,110,0.3);
  color: var(--accent);
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.78rem;
  font-weight: 600;
  transition: all 0.2s;
}
.copy-btn:hover { background: var(--accent); color: var(--bg); }
.copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }

/* ── 고증 상세 ── */
.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.detail-item {
  background: var(--bg);
  border-radius: 8px;
  padding: 0.75rem;
}
.detail-item .label {
  font-size: 0.72rem;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 0.35rem;
  letter-spacing: 0.3px;
}
.detail-item .value {
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.5;
}
.detail-item .tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
}
.detail-item .mini-tag {
  font-size: 0.72rem;
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--text2);
}

/* ── 전체 다운로드 영역 ── */
.download-section {
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-top: 2rem;
  text-align: center;
}
.download-section h3 {
  margin-bottom: 1rem;
  color: var(--accent2);
}

/* ── 반응형 ── */
@media (max-width: 600px) {
  .header h1 { font-size: 1.3rem; }
  .heritage-grid { grid-template-columns: 1fr; }
  .option-grid { grid-template-columns: 1fr 1fr; }
  .container { padding: 1rem; }
}
</style>
</head>

<!-- 헤더 -->
<div class="header">
  <h1>한국 문화유산 AI 이미지 프롬프트 생성기</h1>

<div class="container">

    <div class="step active" id="step1-indicator">

    </div>
    <div class="step" id="step2-indicator">
      <span class="step-num">2</span> 스타일 선택
    </div>
    <div class="step" id="step3-indicator">
      <span class="step-num">3</span> AI 모델 선택
    </div>
    <div class="step" id="step4-indicator">
      <span class="step-num">4</span> 프롬프트 확인
    </div>
  </div>

  <!-- ========== STEP 1: 문화유산 선택 ========== -->
  <div class="section visible" id="step1">
    <div class="section-title">어떤 문화유산의 이미지를 만들고 싶으세요?</div>

    <div class="category-tabs" id="categoryTabs"></div>
    <div class="heritage-grid" id="heritageGrid"></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-to-step2" disabled onclick="goStep(2)">
        다음: 스타일 선택 →
      </button>
    </div>
  </div>

  <!-- ========== STEP 2: 스타일 선택 ========== -->
  <div class="section" id="step2">
    <div class="section-title">어떤 스타일의 이미지를 만들까요?</div>

    <div class="option-grid" id="styleGrid"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(1)">← 뒤로</button>
      <button class="btn btn-primary" id="btn-to-step3" disabled onclick="goStep(3)">
        다음: AI 모델 선택 →
      </button>
    </div>
  </div>

  <!-- ========== STEP 3: AI 모델 선택 ========== -->
  <div class="section" id="step3">
    <div class="section-title">어떤 AI 도구에서 사용할 프롬프트인가요?</div>

    <div class="option-grid" id="modelGrid"></div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(2)">← 뒤로</button>
      <button class="btn btn-generate" onclick="generatePrompts()">
        프롬프트 생성하기
      </button>
    </div>
  </div>

  <!-- ========== STEP 4: 결과 ========== -->
  <div class="section" id="step4">
    <div class="section-title" id="resultTitle">생성된 프롬프트</div>

    <div class="results-area" id="resultsArea"></div>

    <div class="download-section">
      <h3>전체 프롬프트 저장하기</h3>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-secondary" onclick="downloadTxt()">텍스트 파일 (.txt) 다운로드</button>
        <button class="btn btn-secondary" onclick="downloadJson()">JSON 파일 다운로드</button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(1)">← 처음부터 다시</button>
      <button class="btn btn-primary" onclick="goStep(2)">스타일 바꿔서 다시 생성</button>
    </div>
  </div>

</div>

function genPhotoPrompt(item) {
  const v = item.visual;
  return [
    `${item.nameEn}, ${item.eraEn}`,
    `featuring: ${v.style.slice(0,4).join(", ")}`,
    `color palette: ${v.colors.join(", ")}`,
    `materials: ${v.materials.join(", ")}`,
    v.atmosphere,
    "photorealistic, highly detailed, 8K resolution, dramatic natural lighting"
  ].join(", ");
}

function genPaintingPrompt(item) {
  const v = item.visual;
  return [
    `${item.nameEn}, ${item.eraEn}`,
    "depicted in traditional Korean painting (Hanguk-hwa) style",
    `elements: ${v.style.slice(0,3).join(", ")}`,
    `color tones: ${v.colors.slice(0,2).join(", ")}`,
    "ink wash and mineral pigment on hanji paper, visible brush strokes",
    "contemplative, artistic, traditional East Asian aesthetic"
  ].join(", ");
}

function genIllustPrompt(item) {
  const v = item.visual;
  return [
    `${item.nameEn}, ${item.eraEn}`,
    `detailed illustration showing: ${v.style.join(", ")}`,
    `palette: ${v.colors.join(", ")}`,
    `materials depicted: ${v.materials.join(", ")}`,
    v.atmosphere,
    "editorial illustration, clean lines, rich detail, cultural accuracy"
  ].join(", ");
}

function gen3dPrompt(item) {
  const v = item.visual;
  return [
    `${item.nameEn}, ${item.eraEn}`,
    `3D render with: ${v.style.slice(0,4).join(", ")}`,
    `realistic materials: ${v.materials.join(", ")}`,
    `color: ${v.colors.slice(0,2).join(", ")}`,
    "cinematic lighting, physically based rendering, octane render, museum quality"
  ].join(", ");
}

function genKoreanPrompt(item, styleName) {
  const v = item.visual;
  const styleMap = {
    "사실적 사진": "사실적 사진 스타일, 고해상도 8K, 자연광",
    "전통 한국화": "전통 한국화 스타일, 한지 위 수묵채색, 붓터치",
    "세밀 일러스트": "세밀한 일러스트레이션, 정확한 고증, 깨끗한 선",
    "3D 렌더링": "3D 렌더링, 사실적 재질 표현, 시네마틱 조명"
  };
  return [
    `한국 ${item.category}: ${item.name}`,
    `시대: ${item.era} (${item.eraEn})`,
    `주요 요소: ${v.style.join(", ")}`,
    `색감: ${v.colors.join(", ")}`,
    `재질: ${v.materials.join(", ")}`,
    `분위기: ${v.atmosphere}`,
    `스타일: ${styleMap[styleName] || styleName}`,
    "고증에 충실한 역사적 표현"
  ].join(". ");
}

function wrapForModel(prompt, modelId) {
  switch (modelId) {
    case "midjourney":
      return prompt + " --ar 16:9 --q 2 --style raw --v 6";
    case "dalle":
      return `Create a historically accurate, detailed image: ${prompt}. Ensure period-appropriate Korean historical accuracy.`;
    case "sd":
      return prompt + ", masterpiece, best quality, ultra detailed, sharp focus";
    default:
      return prompt;
  }
}

function init() {
  renderCategories();
  renderHeritage("전체");
  renderStyles();
  renderModels();
}

function renderCategories() {
  const cats = ["전체", ...new Set(HERITAGE_DB.map(h => h.category))];
  const el = document.getElementById("categoryTabs");
  el.innerHTML = cats.map(c =>
    `<div class="cat-tab ${c==='전체'?'active':''}" onclick="filterCategory('${c}')">${c}</div>`
  ).join("");
}

function filterCategory(cat) {
  document.querySelectorAll(".cat-tab").forEach(t => t.classList.toggle("active", t.textContent === cat));
  renderHeritage(cat);
}

function renderHeritage(cat) {
  const items = cat === "전체" ? HERITAGE_DB : HERITAGE_DB.filter(h => h.category === cat);
  const grid = document.getElementById("heritageGrid");
  grid.innerHTML = items.map(h => `
    <div class="heritage-card ${selectedHeritage?.id===h.id?'selected':''}" onclick="selectHeritage('${h.id}')">
      <span class="card-type">${h.type}</span>
      <div class="card-name">${h.name}</div>
      <div class="card-name-en">${h.nameEn}</div>
      <div class="card-meta">
        <span class="card-era">${h.era}</span>
        <span class="card-era">${h.location}</span>
      </div>
      <div class="card-desc">${h.desc}</div>
    </div>
  `).join("");
}

function selectHeritage(id) {
  selectedHeritage = HERITAGE_DB.find(h => h.id === id);
  document.querySelectorAll(".heritage-card").forEach(c =>
    c.classList.toggle("selected", c.querySelector(".card-name-en")?.textContent === selectedHeritage.nameEn)
  );
  document.getElementById("btn-to-step2").disabled = false;
}

function renderStyles() {
  const grid = document.getElementById("styleGrid");
  grid.innerHTML = STYLES.map(s => `
    <div class="option-card" onclick="toggleStyle('${s.id}')" id="style-${s.id}">
      <div class="opt-icon">${s.icon}</div>
      <div class="opt-name">${s.name}</div>
      <div class="opt-desc">${s.desc}</div>
    </div>
  `).join("");
}

function toggleStyle(id) {
  const idx = selectedStyles.indexOf(id);
  if (idx >= 0) selectedStyles.splice(idx, 1);
  else selectedStyles.push(id);
  STYLES.forEach(s => document.getElementById(`style-${s.id}`).classList.toggle("selected", selectedStyles.includes(s.id)));
  document.getElementById("btn-to-step3").disabled = selectedStyles.length === 0;
}

function renderModels() {
  const grid = document.getElementById("modelGrid");
  grid.innerHTML = MODELS.map(m => `
    <div class="option-card" onclick="toggleModel('${m.id}')" id="model-${m.id}">
      <div class="opt-icon">${m.icon}</div>
      <div class="opt-name">${m.name}</div>
      <div class="opt-desc">${m.desc}</div>
    </div>
  `).join("");
}

function toggleModel(id) {
  const idx = selectedModels.indexOf(id);
  if (idx >= 0) selectedModels.splice(idx, 1);
  else selectedModels.push(id);
  MODELS.forEach(m => document.getElementById(`model-${m.id}`).classList.toggle("selected", selectedModels.includes(m.id)));
}


// ══════════════════════════════════════════════
// 단계 이동
// ══════════════════════════════════════════════

function goStep(n) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("visible"));
  document.getElementById(`step${n}`).classList.add("visible");

  document.querySelectorAll(".step").forEach((s, i) => {
    s.classList.remove("active", "done");
    if (i + 1 < n) s.classList.add("done");
    if (i + 1 === n) s.classList.add("active");
  });

  window.scrollTo({ top: 0, behavior: "smooth" });
}


// ══════════════════════════════════════════════
// 프롬프트 생성
// ══════════════════════════════════════════════

function generatePrompts() {
  if (!selectedHeritage) return;
  const item = selectedHeritage;
  const models = selectedModels.length > 0 ? selectedModels : ["general"];
  generatedPrompts = [];

  // 결과 제목
  document.getElementById("resultTitle").textContent = `${item.name} — 생성된 프롬프트`;

  const area = document.getElementById("resultsArea");
  let html = "";

  // 고증 상세 정보
  html += `<div class="result-block">
    <div class="result-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'block'">
      <h3>📋 ${item.name} 고증 정보</h3>
      <span class="tag">${item.type} · ${item.era}</span>
    </div>
    <div class="result-body">
      <p style="margin-bottom:1rem;color:var(--text2);font-size:0.9rem;">${item.desc}</p>
      <div class="detail-grid">
        <div class="detail-item">
          <div class="label">시대</div>
          <div class="value">${item.era} (${item.eraEn})</div>
          ${ERA_CONTEXT[item.era] ? `<div class="value" style="margin-top:0.3rem;font-size:0.78rem;color:var(--text2)">${ERA_CONTEXT[item.era]}</div>` : ""}
        </div>
        <div class="detail-item">
          <div class="label">양식 · 구조</div>
          <div class="tag-list">${item.visual.style.map(s => `<span class="mini-tag">${s}</span>`).join("")}</div>
        </div>
        <div class="detail-item">
          <div class="label">색상 팔레트</div>
          <div class="tag-list">${item.visual.colors.map(c => `<span class="mini-tag">${c}</span>`).join("")}</div>
        </div>
        <div class="detail-item">
          <div class="label">재질 · 소재</div>
          <div class="tag-list">${item.visual.materials.map(m => `<span class="mini-tag">${m}</span>`).join("")}</div>
        </div>
      </div>
    </div>
  </div>`;

  // 스타일 × 모델 별 프롬프트 생성
  for (const styleId of selectedStyles) {
    const styleName = STYLE_NAMES[styleId];
    const baseFn = STYLE_FN[styleId];
    const basePrompt = baseFn(item);
    const korPrompt = genKoreanPrompt(item, styleName);

    for (const modelId of models) {
      const model = MODELS.find(m => m.id === modelId);
      const finalPrompt = wrapForModel(basePrompt, modelId);
      const promptId = `prompt-${styleId}-${modelId}`;
      const korId = `prompt-${styleId}-${modelId}-ko`;

      generatedPrompts.push({
        style: styleName,
        model: model.name,
        promptEn: finalPrompt,
        promptKo: korPrompt
      });

      html += `<div class="result-block">
        <div class="result-header">
          <h3>${styleName} — ${model.name}</h3>
          <span class="tag">${model.icon} ${model.name}</span>
        </div>
        <div class="result-body">
          <div class="prompt-box">
            <div class="prompt-label">영문 프롬프트 (복사해서 AI에 입력하세요)</div>
            <div class="prompt-text" id="${promptId}">${finalPrompt}</div>
            <button class="copy-btn" onclick="copyPrompt('${promptId}', this)">복사</button>
          </div>
          <div class="prompt-box">
            <div class="prompt-label">한글 프롬프트 (한글 지원 모델용)</div>
            <div class="prompt-text" id="${korId}">${korPrompt}</div>
            <button class="copy-btn" onclick="copyPrompt('${korId}', this)">복사</button>
          </div>
        </div>
      </div>`;
    }
  }

  area.innerHTML = html;
  goStep(4);
}


// ══════════════════════════════════════════════
// 복사 & 다운로드
// ══════════════════════════════════════════════

function copyPrompt(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "복사됨!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "복사";
      btn.classList.remove("copied");
    }, 2000);
  });
}

function downloadTxt() {
  if (!selectedHeritage || generatedPrompts.length === 0) return;
  let txt = `${selectedHeritage.name} (${selectedHeritage.nameEn})\n`;
  txt += `${selectedHeritage.type} | ${selectedHeritage.era} | ${selectedHeritage.category}\n`;
  txt += "=".repeat(60) + "\n\n";

  for (const p of generatedPrompts) {
    txt += `[${p.style} — ${p.model} — 영문]\n${p.promptEn}\n\n`;
    txt += `[${p.style} — ${p.model} — 한글]\n${p.promptKo}\n\n`;
    txt += "-".repeat(40) + "\n\n";
  }

  const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${selectedHeritage.name}_프롬프트.txt`;
  a.click();
}

function downloadJson() {
  if (!selectedHeritage || generatedPrompts.length === 0) return;
  const data = {
    heritage: {
      name: selectedHeritage.name,
      nameEn: selectedHeritage.nameEn,
      type: selectedHeritage.type,
      era: selectedHeritage.era,
      category: selectedHeritage.category,
      visual: selectedHeritage.visual
    },
    prompts: generatedPrompts
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${selectedHeritage.name}_프롬프트.json`;
  a.click();
}

// 초기화
init();
</script>
</body>
