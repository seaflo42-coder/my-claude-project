<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 성숙도 진단 | AX Assessment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- STEP 0: Landing -->
        <section id="step-landing" class="step active">
            <div class="landing-container">
                <div class="landing-badge">AI MATURITY ASSESSMENT</div>
                <h1 class="landing-title">
                    그동안의 AI 기업교육,<br>
                    <span class="highlight">정말 일하는 방식을</span><br>
                    <span class="highlight">바꾸었나요?</span>
                </h1>
                <p class="landing-subtitle">
                    교육을 넘어 <strong>조직의 DNA</strong>를 바꾸는<br>
                    AI Transformation, <strong>AX</strong>가 필요합니다.
                </p>
                <div class="landing-stats">
                    <div class="stat-item">
                        <span class="stat-number">3분</span>
                        <span class="stat-label">소요 시간</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">7개</span>
                        <span class="stat-label">진단 영역</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">즉시</span>
                        <span class="stat-label">리포트 발행</span>
                    </div>
                </div>
                <button class="btn-primary btn-large" onclick="startAssessment()">
                    우리 조직 AI 성숙도 진단하기
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
                <p class="landing-note">진단 완료 시 맞춤형 컨설팅 리포트를 이메일로 발송해드립니다</p>
            </div>
        </section>

        <!-- STEP 1~7: Assessment Questions -->
        <section id="step-assessment" class="step">
            <div class="assessment-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                    <span class="progress-text" id="progressText">1 / 7</span>
                </div>
                <div class="question-area" id="questionArea"></div>
                <div class="nav-buttons">
                    <button class="btn-secondary" id="btnPrev" onclick="prevQuestion()" style="visibility:hidden;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        이전
                    </button>
                    <button class="btn-primary" id="btnNext" onclick="nextQuestion()" disabled>
                        다음
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- STEP: Lead Form -->
        <section id="step-lead" class="step">
            <div class="lead-container">
                <div class="lead-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6C5CE7" stroke-width="1.5"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
                </div>
                <h2>진단이 완료되었습니다!</h2>
                <p class="lead-subtitle">아래 정보를 입력하시면<br><strong>맞춤형 AI 성숙도 컨설팅 리포트</strong>를 바로 확인하고<br>이메일로도 받아보실 수 있습니다.</p>
                <form id="leadForm" onsubmit="submitLead(event)">
                    <div class="form-group">
                        <label for="companyName">회사명 <span class="required">*</span></label>
                        <input type="text" id="companyName" placeholder="예: 삼성전자" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="userName">이름 <span class="required">*</span></label>
                            <input type="text" id="userName" placeholder="홍길동" required>
                        </div>
                        <div class="form-group">
                            <label for="userPosition">직책</label>
                            <input type="text" id="userPosition" placeholder="예: HRD 팀장">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="department">소속 부서</label>
                        <input type="text" id="department" placeholder="예: 인재개발팀">
                    </div>
                    <div class="form-group">
                        <label for="userEmail">이메일 <span class="required">*</span></label>
                        <input type="email" id="userEmail" placeholder="example@company.com" required>
                    </div>
                    <div class="form-group">
                        <label for="userPhone">연락처</label>
                        <input type="tel" id="userPhone" placeholder="010-0000-0000">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="employeeCount">임직원 수</label>
                            <select id="employeeCount">
                                <option value="">선택해주세요</option>
                                <option value="~50">50명 이하</option>
                                <option value="50~200">50~200명</option>
                                <option value="200~1000">200~1,000명</option>
                                <option value="1000~5000">1,000~5,000명</option>
                                <option value="5000+">5,000명 이상</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="industry">산업군</label>
                            <select id="industry">
                                <option value="">선택해주세요</option>
                                <option value="제조">제조</option>
                                <option value="IT/테크">IT/테크</option>
                                <option value="금융">금융</option>
                                <option value="유통/커머스">유통/커머스</option>
                                <option value="건설/부동산">건설/부동산</option>
                                <option value="의료/바이오">의료/바이오</option>
                                <option value="교육">교육</option>
                                <option value="미디어/엔터">미디어/엔터</option>
                                <option value="공공/공기업">공공/공기업</option>
                                <option value="기타">기타</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="interest">관심 영역 <span class="text-muted">(선택)</span></label>
                        <select id="interest">
                            <option value="">선택해주세요</option>
                            <option value="AX전략수립">AX 전략 수립 컨설팅</option>
                            <option value="AI역량교육">AI 역량 교육 프로그램</option>
                            <option value="변화관리">조직 변화관리 프로그램</option>
                            <option value="AI인프라">AI 인프라/플랫폼 구축</option>
                            <option value="전체">전체 AX 프로그램</option>
                        </select>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="privacyAgree" required>
                        <label for="privacyAgree">개인정보 수집 및 이용에 동의합니다 <span class="required">*</span></label>
                    </div>
                    <button type="submit" class="btn-primary btn-large btn-full" id="submitBtn">
                        분석 리포트 확인하기
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </form>
            </div>
        </section>

        <!-- STEP: Report -->
        <section id="step-report" class="step">
            <div class="report-container" id="reportContainer"></div>
        </section>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
